<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发布动态 - 陌恋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
        }
        
        body {
            background: linear-gradient(180deg, #F8F9FD 0%, #FAFBFF 100%);
            overflow-x: hidden;
        }
        
        .phone-frame {
            width: 393px;
            height: 852px;
            margin: 20px auto;
            background: #000;
            border-radius: 50px;
            padding: 3px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        
        .phone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #FAFBFF 0%, #FFFFFF 100%);
            border-radius: 47px;
            overflow: hidden;
            position: relative;
        }
        
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 1000;
        }
        
        .gradient-primary {
            background: linear-gradient(135deg, #9D31FF 0%, #F260FF 50%, #FF609F 100%);
        }
        
        .card-shadow {
            box-shadow: 0 2px 8px rgba(157, 49, 255, 0.08);
        }
        
        .btn-press {
            transition: all 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .btn-press:active {
            transform: scale(0.95);
        }
        
        .category-btn {
            transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
            position: relative;
            overflow: hidden;
        }
        
        .category-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(157, 49, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }
        
        .category-btn:active::before {
            width: 100%;
            height: 100%;
        }
        
        .category-btn.active {
            background: linear-gradient(135deg, #9D31FF 0%, #F260FF 50%, #FF609F 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(157, 49, 255, 0.3);
        }
        
        .image-upload-box {
            width: 106px;
            height: 106px;
            border: 2px dashed #E5E7EB;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
            background: #FAFBFF;
        }
        
        .image-upload-box:hover {
            border-color: #9D31FF;
            background: rgba(157, 49, 255, 0.05);
            transform: translateY(-2px);
        }
        
        .image-upload-box:active {
            transform: scale(0.95);
        }
        
        .image-container {
            position: relative;
            display: inline-block;
            animation: imageAppear 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        @keyframes imageAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .uploaded-image {
            width: 106px;
            height: 106px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(157, 49, 255, 0.12);
        }
        
        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
            transition: all 0.2s ease;
        }
        
        .remove-image:hover {
            transform: scale(1.1);
        }
        
        .remove-image:active {
            transform: scale(0.9);
        }
        
        .mood-tag {
            transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
            position: relative;
        }
        
        .mood-tag.active {
            background: linear-gradient(135deg, rgba(157, 49, 255, 0.1) 0%, rgba(242, 96, 255, 0.1) 100%);
            border-color: #9D31FF;
            transform: translateY(-2px);
        }
        
        textarea {
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            box-shadow: 0 0 0 3px rgba(157, 49, 255, 0.1);
        }
        
        .char-count {
            font-size: 12px;
            color: #9CA3AF;
            transition: color 0.3s ease;
        }
        
        .char-count.warning {
            color: #F59E0B;
        }
        
        .char-count.error {
            color: #EF4444;
        }
        
        .publish-btn {
            transition: all 0.3s ease;
        }
        
        .publish-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .publish-btn:not(:disabled):hover {
            box-shadow: 0 6px 16px rgba(157, 49, 255, 0.4);
            transform: translateY(-1px);
        }
        
        .location-card {
            transition: all 0.3s ease;
        }
        
        .location-card:active {
            background: #F8F9FD;
        }
        
        /* 图片上传动画 */
        @keyframes uploadPulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .uploading {
            animation: uploadPulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="phone-frame">
        <div class="phone-screen">
            <div class="notch"></div>
            
            <!-- 发布动态页面 -->
            <div class="h-full flex flex-col">
                <!-- 顶部导航 -->
                <div class="bg-white pt-12 pb-4 px-5 flex items-center justify-between border-b border-gray-100">
                    <button class="text-gray-600 btn-press">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                    <h1 class="text-lg font-semibold text-gray-900">发布动态</h1>
                    <button class="gradient-primary text-white px-5 py-2 rounded-full text-sm font-medium btn-press">
                        发布
                    </button>
                </div>
                
                <!-- 内容区 -->
                <div class="flex-1 overflow-y-auto px-5 pt-5 pb-10">
                    <!-- 分类选择 -->
                    <div class="mb-6">
                        <label class="text-sm font-medium text-gray-700 mb-3 block">选择分类</label>
                        <div class="flex flex-wrap gap-2.5">
                            <button class="category-btn px-5 py-2.5 rounded-full bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press active">
                                <i class="fas fa-utensils mr-1.5"></i> 美食
                            </button>
                            <button class="category-btn px-5 py-2.5 rounded-full bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                <i class="fas fa-briefcase mr-1.5"></i> 工作
                            </button>
                            <button class="category-btn px-5 py-2.5 rounded-full bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                <i class="fas fa-book mr-1.5"></i> 学习
                            </button>
                            <button class="category-btn px-5 py-2.5 rounded-full bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                <i class="fas fa-paw mr-1.5"></i> 宠物
                            </button>
                            <button class="category-btn px-5 py-2.5 rounded-full bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                <i class="fas fa-heart mr-1.5"></i> 心情
                            </button>
                            <button class="category-btn px-5 py-2.5 rounded-full bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                <i class="fas fa-plane mr-1.5"></i> 旅行
                            </button>
                        </div>
                    </div>
                    
                    <!-- 文字输入 -->
                    <div class="mb-6">
                        <div class="bg-white rounded-2xl p-4 border border-gray-200 card-shadow">
                            <textarea 
                                id="contentInput"
                                class="w-full bg-transparent border-none focus:outline-none resize-none text-gray-800 leading-relaxed"
                                rows="6"
                                maxlength="500"
                                placeholder="分享你的生活瞬间...&#10;&#10;可以是今天的美食、工作的感悟、学习的收获..."></textarea>
                            <div class="flex justify-between items-center mt-2 pt-3 border-t border-gray-100">
                                <div class="flex gap-3">
                                    <button class="text-gray-400 hover:text-purple-600 transition-colors btn-press">
                                        <i class="fas fa-smile text-xl"></i>
                                    </button>
                                    <button class="text-gray-400 hover:text-purple-600 transition-colors btn-press">
                                        <i class="fas fa-at text-xl"></i>
                                    </button>
                                    <button class="text-gray-400 hover:text-purple-600 transition-colors btn-press">
                                        <i class="fas fa-hashtag text-xl"></i>
                                    </button>
                                </div>
                                <span class="char-count" id="charCount">0/500</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 图片上传 -->
                    <div class="mb-6">
                        <label class="text-sm font-medium text-gray-700 mb-3 block">
                            <i class="fas fa-images mr-1.5 text-purple-600"></i>
                            添加图片
                            <span class="text-gray-400 font-normal">（最多9张）</span>
                        </label>
                        <div id="imageGrid" class="flex flex-wrap gap-3">
                            <input type="file" id="imageInput" accept="image/*" multiple class="hidden">
                            <div class="image-upload-box" onclick="document.getElementById('imageInput').click()">
                                <div class="text-center">
                                    <i class="fas fa-camera text-3xl text-gray-400 mb-2"></i>
                                    <div class="text-xs text-gray-500 font-medium">添加图片</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 氛围标签 -->
                    <div class="mb-6">
                        <label class="text-sm font-medium text-gray-700 mb-3 block">
                            <i class="fas fa-sparkles mr-1.5 text-purple-600"></i>
                            选择氛围
                            <span class="text-gray-400 font-normal">（可选）</span>
                        </label>
                        <div class="flex flex-wrap gap-2.5">
                            <button class="mood-tag px-4 py-2.5 rounded-xl bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                🌸 治愈
                            </button>
                            <button class="mood-tag px-4 py-2.5 rounded-xl bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                ⚡ 元气满满
                            </button>
                            <button class="mood-tag px-4 py-2.5 rounded-xl bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                🌙 emo时刻
                            </button>
                            <button class="mood-tag px-4 py-2.5 rounded-xl bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                🎵 chill
                            </button>
                            <button class="mood-tag px-4 py-2.5 rounded-xl bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                💪 奋斗中
                            </button>
                            <button class="mood-tag px-4 py-2.5 rounded-xl bg-white border border-gray-200 text-gray-700 text-sm font-medium btn-press">
                                🎉 开心
                            </button>
                        </div>
                    </div>
                    
                    <!-- 位置 -->
                    <div class="location-card bg-white rounded-2xl p-4 card-shadow flex items-center justify-between btn-press cursor-pointer">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-100 to-pink-100 flex items-center justify-center">
                                <i class="fas fa-map-marker-alt text-purple-600 text-lg"></i>
                            </div>
                            <span class="ml-3 text-gray-700 font-medium">添加位置</span>
                        </div>
                        <i class="fas fa-chevron-right text-gray-400"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 分类选择
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // 氛围标签选择（可多选）
        document.querySelectorAll('.mood-tag').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });
        
        // 字数统计
        const contentInput = document.getElementById('contentInput');
        const charCount = document.getElementById('charCount');
        
        contentInput.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = `${length}/500`;
            
            charCount.classList.remove('warning', 'error');
            if (length > 450) {
                charCount.classList.add('error');
            } else if (length > 400) {
                charCount.classList.add('warning');
            }
        });
        
        // 图片上传处理
        const imageInput = document.getElementById('imageInput');
        const imageGrid = document.getElementById('imageGrid');
        let uploadedImages = [];
        const maxImages = 9;
        
        imageInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                if (uploadedImages.length >= maxImages) {
                    alert(`最多只能上传${maxImages}张图片`);
                    return;
                }
                
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImages.push({
                        id: Date.now() + Math.random(),
                        url: e.target.result
                    });
                    renderImages();
                };
                reader.readAsDataURL(file);
            });
            
            // 清空input，允许重复选择同一文件
            this.value = '';
        });
        
        function renderImages() {
            // 清空现有图片（保留上传按钮）
            const uploadBox = imageGrid.querySelector('.image-upload-box');
            imageGrid.innerHTML = '';
            
            // 渲染已上传的图片
            uploadedImages.forEach(img => {
                const container = document.createElement('div');
                container.className = 'image-container';
                container.innerHTML = `
                    <img src="${img.url}" class="uploaded-image" alt="上传的图片">
                    <button class="remove-image" onclick="removeImage('${img.id}')">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                imageGrid.appendChild(container);
            });
            
            // 如果未达到最大数量，显示上传按钮
            if (uploadedImages.length < maxImages) {
                imageGrid.appendChild(uploadBox);
            }
        }
        
        function removeImage(id) {
            uploadedImages = uploadedImages.filter(img => img.id !== id);
            renderImages();
        }
        
        // 发布按钮状态控制
        const publishBtn = document.querySelector('.gradient-primary');
        
        function updatePublishButton() {
            const hasContent = contentInput.value.trim().length > 0;
            const hasImages = uploadedImages.length > 0;
            
            if (hasContent || hasImages) {
                publishBtn.disabled = false;
                publishBtn.style.opacity = '1';
            } else {
                publishBtn.disabled = true;
                publishBtn.style.opacity = '0.5';
            }
        }
        
        contentInput.addEventListener('input', updatePublishButton);
        
        // 初始化发布按钮状态
        updatePublishButton();
        
        // 发布动作
        publishBtn.addEventListener('click', function() {
            if (this.disabled) return;
            
            const content = contentInput.value.trim();
            const category = document.querySelector('.category-btn.active')?.textContent.trim();
            const moods = Array.from(document.querySelectorAll('.mood-tag.active')).map(tag => tag.textContent.trim());
            
            console.log('发布内容:', {
                category,
                content,
                images: uploadedImages.length,
                moods
            });
            
            // 模拟发布成功
            this.innerHTML = '<i class="fas fa-check mr-1"></i> 已发布';
            setTimeout(() => {
                this.innerHTML = '发布';
            }, 2000);
        });
        
        // 位置选择
        document.querySelector('.location-card').addEventListener('click', function() {
            const hasLocation = this.querySelector('.text-gray-700').textContent === '添加位置';
            
            if (hasLocation) {
                // 模拟选择位置
                this.querySelector('.text-gray-700').textContent = '北京·朝阳区';
                this.querySelector('.fa-map-marker-alt').style.color = '#9D31FF';
            } else {
                // 取消位置
                this.querySelector('.text-gray-700').textContent = '添加位置';
                this.querySelector('.fa-map-marker-alt').style.color = '';
            }
        });
    </script>
</body>
</html>
